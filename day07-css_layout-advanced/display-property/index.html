<!-- Day 7 CSS Learning -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Property</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<!-- block elements custom width and height work -->
 <div id="block">Block Element</div>

 <!-- inline elements custom width and height not work also margin top and buttom . -->
 <span id="inline1">Inline Element1</span>
 <span id="inline2">Inline Element2</span>

 <!-- inline-block elements its mainly a inline elements but custom w & h working also margin top & buttom -->
 <div id="separation">it's a div to create separation b/w previous  inline elements</div>
 <span id="inline3" class="inline-block">Inline Element1</span>
 <span id="inline4" class="inline-block">Inline Element2</span>

 <!-- display-none  -->
 <h2 style="padding-left: 10px;">Below div vanish because of display none</h2>
 <div id="display-none"></div>
 <h2 style="padding-left: 10px;">Above div vanish because of display none</h2>
</body>

</html>
